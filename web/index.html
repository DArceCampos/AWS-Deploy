<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AWS Project — Daniel Arce</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg: #050a0e;
            --surface: #0c1a24;
            --orange: #ff6b35;
            --cyan: #00d4ff;
            --text: #e8f4f8;
            --muted: #5a7a8a;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Syne', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* Grid background */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(0, 212, 255, 0.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 212, 255, 0.04) 1px, transparent 1px);
            background-size: 60px 60px;
            pointer-events: none;
        }

        /* Glowing orbs */
        body::after {
            content: '';
            position: fixed;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(255, 107, 53, 0.12) 0%, transparent 70%);
            top: -100px;
            right: -100px;
            pointer-events: none;
            animation: pulse 6s ease-in-out infinite;
        }

        .orb2 {
            position: fixed;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(0, 212, 255, 0.08) 0%, transparent 70%);
            bottom: -100px;
            left: -100px;
            pointer-events: none;
            animation: pulse 8s ease-in-out infinite reverse;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.1); opacity: 0.7; }
        }

        .card {
            position: relative;
            background: var(--surface);
            border: 1px solid rgba(0, 212, 255, 0.15);
            padding: 64px 72px;
            max-width: 780px;
            width: 90%;
            animation: fadeUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--orange), var(--cyan), transparent);
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .label {
            font-family: 'DM Mono', monospace;
            font-size: 11px;
            font-weight: 300;
            letter-spacing: 0.2em;
            color: var(--orange);
            text-transform: uppercase;
            margin-bottom: 28px;
            display: flex;
            align-items: center;
            gap: 12px;
            animation: fadeUp 0.8s 0.1s cubic-bezier(0.16, 1, 0.3, 1) both;
        }

        .label::after {
            content: '';
            flex: 1;
            height: 1px;
            background: linear-gradient(90deg, var(--orange), transparent);
            opacity: 0.4;
        }

        h1 {
            font-size: clamp(2.8rem, 6vw, 4.5rem);
            font-weight: 800;
            line-height: 1.0;
            letter-spacing: -0.02em;
            margin-bottom: 8px;
            animation: fadeUp 0.8s 0.2s cubic-bezier(0.16, 1, 0.3, 1) both;
        }

        h1 span {
            background: linear-gradient(135deg, var(--cyan), var(--orange));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .author {
            font-family: 'DM Mono', monospace;
            font-size: 0.95rem;
            color: var(--muted);
            margin-bottom: 52px;
            animation: fadeUp 0.8s 0.3s cubic-bezier(0.16, 1, 0.3, 1) both;
        }

        .author strong { color: var(--text); font-weight: 400; }

        .divider {
            height: 1px;
            background: linear-gradient(90deg, rgba(0,212,255,0.2), transparent);
            margin-bottom: 40px;
            animation: fadeUp 0.8s 0.35s cubic-bezier(0.16, 1, 0.3, 1) both;
        }

        .stack-label {
            font-family: 'DM Mono', monospace;
            font-size: 10px;
            letter-spacing: 0.25em;
            color: var(--muted);
            text-transform: uppercase;
            margin-bottom: 20px;
            animation: fadeUp 0.8s 0.4s cubic-bezier(0.16, 1, 0.3, 1) both;
        }

        .tags {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            animation: fadeUp 0.8s 0.5s cubic-bezier(0.16, 1, 0.3, 1) both;
        }

        .tag {
            font-family: 'DM Mono', monospace;
            font-size: 0.75rem;
            padding: 8px 18px;
            border: 1px solid;
            letter-spacing: 0.08em;
            transition: all 0.25s ease;
            cursor: default;
        }

        .tag:nth-child(1) { border-color: rgba(255,107,53,0.4); color: var(--orange); }
        .tag:nth-child(2) { border-color: rgba(0,212,255,0.4); color: var(--cyan); }
        .tag:nth-child(3) { border-color: rgba(255,107,53,0.4); color: var(--orange); }
        .tag:nth-child(4) { border-color: rgba(0,212,255,0.4); color: var(--cyan); }

        .tag:hover {
            background: rgba(255,255,255,0.04);
            transform: translateY(-2px);
        }

        .corner {
            position: absolute;
            bottom: 20px;
            right: 24px;
            font-family: 'DM Mono', monospace;
            font-size: 9px;
            letter-spacing: 0.15em;
            color: rgba(90,122,138,0.4);
            text-transform: uppercase;
        }
    </style>
</head>
<body>
    <div class="orb2"></div>
    <div class="card">
        <div class="label">Infrastructure Project</div>
        <h1>AWS<br><span>Cloud Deploy</span></h1>
        <div class="author">by <strong>Daniel Arce Campos</strong></div>
        <div class="divider"></div>
        <div class="stack-label">Tech Stack</div>
        <div class="tags">
            <div class="tag">ECR</div>
            <div class="tag">ECS</div>
            <div class="tag">Fargate</div>
            <div class="tag">Terraform</div>
            <div class="tag">GitHub Actions</div>
            <div class="tag">CI/CD</div>
        </div>
        <div class="corner">v1.0.0</div>
    </div>
</body>
</html>
